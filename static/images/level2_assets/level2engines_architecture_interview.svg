<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="2460" viewBox="0 0 2400 2460">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
  </marker>
  <style>
    text { font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
  </style>
</defs>
<rect width="100%" height="100%" fill="#f7f8fb"/>
<text x="1200.0" y="58" text-anchor="middle" font-size="34" font-weight="800" fill="#111">level2engines / theme_signals_v05_phase2 项目架构图</text>
<text x="1200.0" y="96" text-anchor="middle" font-size="20" fill="#555">Level-2(二级盘口)强势票信号系统:四大拼图 → mode(模式)评估 → arbitration(仲裁) → Phase3(交易闭环)</text>
<rect x="240" y="140" width="1920" height="238" rx="18" ry="18" fill="#fff7e6" stroke="#d98c00" stroke-width="2"/>
<text x="1200.0" y="174" text-anchor="middle" font-size="26" font-weight="700" fill="#111">0. Data Input(数据输入层)</text>
<text x="264" y="208" font-size="19" fill="#222">WatchRow(观察池候选):日期、代码、题材、角色、板位、题材排名、题材宽度、情绪分、扩散分</text>
<text x="264" y="239" font-size="19" fill="#222">DailyBar(日线数据):开高低收、成交额、昨日收盘，用于箱体、突破、放量、压力位</text>
<text x="264" y="270" font-size="19" fill="#222">AuctionMetrics(竞价指标):竞价涨幅、竞价金额占比、竞价不平衡、是否可交易</text>
<text x="264" y="301" font-size="19" fill="#222">CheckpointRow / SnapshotPoint(盘口快照):09:25、09:30、09:35、09:40、09:45、10:00 等 Level-2 数据</text>
<text x="264" y="332" font-size="19" fill="#222">Index Minute Features(指数分钟特征):SH000001(上证)、SH000852(中证1000)早盘 30min 支撑 / 恐慌判断</text>
<line x1="1200.0" y1="378" x2="1200.0" y2="438" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="1041.5" y="393.0" width="317" height="30" rx="8" fill="#fff" opacity="0.88"/>
<text x="1200.0" y="413.0" text-anchor="middle" font-size="16" fill="#333">构建画像 Build Profiles(构建画像)</text>
<rect x="240" y="438" width="455" height="335" rx="18" ry="18" fill="#e9f2ff" stroke="#3a6ea5" stroke-width="2"/>
<text x="467.5" y="472" text-anchor="middle" font-size="22" font-weight="700" fill="#111">1. Environment(环境拼图)</text>
<text x="264" y="506" font-size="16" fill="#222">核心对象:MarketGateState环境闸门</text>
<text x="264" y="534" font-size="16" fill="#222">输入:情绪分、扩散分、风格偏好</text>
<text x="264" y="562" font-size="16" fill="#222">叠加:指数30m表现、早盘承接</text>
<text x="264" y="590" font-size="16" fill="#222">输出:市场状态=expanding|active|</text>
<text x="264" y="618" font-size="16" fill="#222">   index_support|split|cold</text>
<text x="264" y="646" font-size="16" fill="#222">输出:交易模式=frontline|selective|wait</text>
<text x="264" y="674" font-size="16" fill="#222">输出:环境倍率和允许交易模式</text>
<text x="264" y="702" font-size="16" fill="#222">作用:决定能否交易、能参与的模式、</text>
<text x="264" y="730" font-size="16" fill="#222">   环境乘数</text>
<rect x="729" y="438" width="455" height="335" rx="18" ry="18" fill="#eaf7ed" stroke="#2f855a" stroke-width="2"/>
<text x="956.5" y="472" text-anchor="middle" font-size="22" font-weight="700" fill="#111">2. Emotion/Absorption(情绪/承接)</text>
<text x="753" y="506" font-size="16" fill="#222">核心对象:盘中</text>
<text x="753" y="534" font-size="16" fill="#222">市场层:情绪分、扩散分</text>
<text x="753" y="562" font-size="16" fill="#222">个股层:承接分、开盘执行分</text>
<text x="753" y="590" font-size="16" fill="#222">关键因子:主动买、主动卖</text>
<text x="753" y="618" font-size="16" fill="#222">关键因子:五档不平衡、中间价涨幅</text>
<text x="753" y="646" font-size="16" fill="#222">承接公式:买卖比+五档偏多</text>
<text x="753" y="674" font-size="16" fill="#222">   +价格推进-卖一压单+可交易奖励</text>
<text x="753" y="702" font-size="16" fill="#222">作用:识别真进攻、假修复、</text>
<text x="753" y="730" font-size="16" fill="#222">   竞价抢跑后兑现</text>
<rect x="1218" y="438" width="455" height="307" rx="18" ry="18" fill="#f4edff" stroke="#6b46c1" stroke-width="2"/>
<text x="1445.5" y="472" text-anchor="middle" font-size="22" font-weight="700" fill="#111">3. Theme(题材拼图)</text>
<text x="1242" y="506" font-size="16" fill="#222">核心对象:题材共振画像</text>
<text x="1242" y="534" font-size="16" fill="#222">输入:题材分、父题材共振</text>
<text x="1242" y="562" font-size="16" fill="#222">相对强弱:题材排名、题材优势差</text>
<text x="1242" y="590" font-size="16" fill="#222">梯队:题材个股数、多板数、最高板</text>
<text x="1242" y="618" font-size="16" fill="#222">可交易:题材可交易分</text>
<text x="1242" y="646" font-size="16" fill="#222">开盘攻击:题材开盘攻击分/排名</text>
<text x="1242" y="674" font-size="16" fill="#222">作用:判断主线、前排、梯队完整，</text>
<text x="1242" y="702" font-size="16" fill="#222">   有无被虹吸</text>
<rect x="1707" y="438" width="455" height="307" rx="18" ry="18" fill="#fff0f0" stroke="#c53030" stroke-width="2"/>
<text x="1934.5" y="472" text-anchor="middle" font-size="22" font-weight="700" fill="#111">4. Stock(个股拼图)</text>
<text x="1731" y="506" font-size="16" fill="#222">核心对象:身份画像、硬结构画像</text>
<text x="1731" y="534" font-size="16" fill="#222">身份分:龙头、核心、次级、弱</text>
<text x="1731" y="562" font-size="16" fill="#222">结构分:箱体有效、触碰次数、突破、</text>
<text x="1731" y="590" font-size="16" fill="#222">   放量、上方压力、是否过度延伸</text>
<text x="1731" y="618" font-size="16" fill="#222">执行:竞价、开盘斜率、买卖比、</text>
<text x="1731" y="646" font-size="16" fill="#222">   队列支撑、是否真实可交易</text>
<text x="1731" y="674" font-size="16" fill="#222">作用:判断这只票自己够不够硬，</text>
<text x="1731" y="702" font-size="16" fill="#222">   能否走 stock-first(个股优先)</text>
<line x1="1200.0" y1="773" x2="1200.0" y2="833" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="1041.5" y="788.0" width="317" height="30" rx="8" fill="#fff" opacity="0.88"/>
<text x="1200.0" y="808.0" text-anchor="middle" font-size="16" fill="#333">四轴汇总 Axis Judgement(四轴判断)</text>
<rect x="390" y="833" width="1620" height="233" rx="18" ry="18" fill="#ffffff" stroke="#555" stroke-width="2"/>
<text x="1200.0" y="867" text-anchor="middle" font-size="24" font-weight="700" fill="#111">Axis Judgement(四轴可解释复盘)</text>
<text x="414" y="901" font-size="18" fill="#222">环境轴:状态、交易模式、扩散是否合格</text>
<text x="414" y="931" font-size="18" fill="#222">情绪轴:情绪和承接是否合格</text>
<text x="414" y="961" font-size="18" fill="#222">题材轴:题材模式、宽度、共振是否合格</text>
<text x="414" y="991" font-size="18" fill="#222">个股轴:身份等级、身份分、入场时间是否合格</text>
<text x="414" y="1021" font-size="18" fill="#222">弱轴数量:0~1 正常，2 合格，&gt;=3 假突破风险</text>
<line x1="1200.0" y1="1066" x2="1200.0" y2="1126" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="1086.5" y="1081.0" width="227" height="30" rx="8" fill="#fff" opacity="0.88"/>
<text x="1200.0" y="1101.0" text-anchor="middle" font-size="16" fill="#333">进入 mode(模式)并行评估</text>
<line x1="1200.0" y1="1126" x2="545" y2="1186" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="1200.0" y1="1126" x2="1200" y2="1186" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="1200.0" y1="1126" x2="1855" y2="1186" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="1200.0" y1="1126" x2="545" y2="1338" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="1200.0" y1="1126" x2="1200" y2="1338" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="1200.0" y1="1126" x2="1855" y2="1338" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="240" y="1186" width="610" height="122" rx="18" ry="18" fill="#ffffff" stroke="#333" stroke-width="2"/>
<text x="545.0" y="1216" text-anchor="middle" font-size="18" font-weight="700" fill="#111">mode1(模式一)龙头分歧转一致</text>
<text x="260" y="1244" font-size="16" fill="#222">前提:龙头身份 + 前一日分歧</text>
<text x="260" y="1270" font-size="16" fill="#222">扣分:竞价走弱、低开未修复、买盘不强、一字锁筹风险</text>
<rect x="895" y="1186" width="610" height="122" rx="18" ry="18" fill="#ffffff" stroke="#333" stroke-width="2"/>
<text x="1200.0" y="1216" text-anchor="middle" font-size="18" font-weight="700" fill="#111">mode2(模式二)共振核心买点</text>
<text x="915" y="1244" font-size="16" fill="#222">前提:题材共振有效，共振分 ≥ 65</text>
<text x="915" y="1270" font-size="16" fill="#222">扣分:题材太薄、买盘不强、竞价走弱、中段确认太晚</text>
<rect x="1550" y="1186" width="610" height="122" rx="18" ry="18" fill="#ffffff" stroke="#333" stroke-width="2"/>
<text x="1855.0" y="1216" text-anchor="middle" font-size="18" font-weight="700" fill="#111">mode3(模式三)分歧转强回封</text>
<text x="1570" y="1244" font-size="16" fill="#222">前提:先释放压力，再被资金重新接回</text>
<text x="1570" y="1270" font-size="16" fill="#222">扣分:吸收不够、非龙头过度延伸、尖峰完全回落</text>
<rect x="240" y="1338" width="610" height="122" rx="18" ry="18" fill="#ffffff" stroke="#333" stroke-width="2"/>
<text x="545.0" y="1368" text-anchor="middle" font-size="18" font-weight="700" fill="#111">mode4(模式四)结构突破</text>
<text x="260" y="1396" font-size="16" fill="#222">前提:个股结构强</text>
<text x="260" y="1422" font-size="16" fill="#222">扣分:扩散不足、盘口不健康、价格水下、上方压力</text>
<rect x="895" y="1338" width="610" height="148" rx="18" ry="18" fill="#fffaf0" stroke="#d69e2e" stroke-width="2"/>
<text x="1200.0" y="1368" text-anchor="middle" font-size="18" font-weight="700" fill="#111">mode5(模式五)个股独立突破</text>
<text x="915" y="1396" font-size="16" fill="#222">定位:个股先于题材，结构先于共振，个股优先</text>
<text x="915" y="1422" font-size="16" fill="#222">路径A:Isolated Breakout(独立先发突破)</text>
<text x="915" y="1448" font-size="16" fill="#222">路径B:Trend Continuation(趋势主升延续)</text>
<rect x="1550" y="1338" width="610" height="148" rx="18" ry="18" fill="#fffaf0" stroke="#d69e2e" stroke-width="2"/>
<text x="1855.0" y="1368" text-anchor="middle" font-size="18" font-weight="700" fill="#111">mode6(模式六)题材先手</text>
<text x="1570" y="1396" font-size="16" fill="#222">定位:前一日主线压力突破，当日早盘承接确认</text>
<text x="1570" y="1422" font-size="16" fill="#222">要求:frontline / replacement(前排/替代主线) + 梯队 + 放量突破</text>
<text x="1570" y="1448" font-size="16" fill="#222">约束:只用 D-1 / D0 可见信息，不能用 D1(次日)倒推</text>
<line x1="1200.0" y1="1486" x2="1200.0" y2="1546" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="1041.5" y="1501.0" width="317" height="30" rx="8" fill="#fff" opacity="0.88"/>
<text x="1200.0" y="1521.0" text-anchor="middle" font-size="16" fill="#333">mode 结果进入 arbitration(仲裁层)</text>
<rect x="330" y="1546" width="1740" height="263" rx="18" ry="18" fill="#e8f5f5" stroke="#2c7a7b" stroke-width="2"/>
<text x="1200.0" y="1580" text-anchor="middle" font-size="24" font-weight="700" fill="#111">Arbitration(仲裁层):选择主模式、计算 FinalScore(最终分)、决定 Decision(决策)</text>
<text x="354" y="1614" font-size="18" fill="#222">1) 题材确认轨:模式1-模式4</text>
<text x="354" y="1644" font-size="18" fill="#222">2) 个股优先轨:模式5和模式6</text>
<text x="354" y="1674" font-size="18" fill="#222">3) 选择主模式，同时保留次模式用于解释</text>
<text x="354" y="1704" font-size="18" fill="#222">4) 最终分 = 原始分 × 市场倍率 × 仲裁倍率 + 开盘加分</text>
<text x="354" y="1734" font-size="18" fill="#222">5) 决策:强买入|观察|跳过</text>
<text x="354" y="1764" font-size="18" fill="#222">6) 仓位权重 = 基础仓位 × 模式乘数 × 分数乘数 × 身份乘数</text>
<line x1="1200.0" y1="1809" x2="1200.0" y2="1869" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="1059.5" y="1824.0" width="281" height="30" rx="8" fill="#fff" opacity="0.88"/>
<text x="1200.0" y="1844.0" text-anchor="middle" font-size="16" fill="#333">输出 SignalDecision(信号决策)</text>
<rect x="390" y="1869" width="1620" height="173" rx="18" ry="18" fill="#ffffff" stroke="#555" stroke-width="2"/>
<text x="1200.0" y="1903" text-anchor="middle" font-size="24" font-weight="700" fill="#111">Bridge &amp; Output(信号桥接与输出)</text>
<text x="414" y="1937" font-size="18" fill="#222">信号决策:记录主模式、买点类型、入场时间、最终分、仓位</text>
<text x="414" y="1967" font-size="18" fill="#222">Bridge(桥接层):把内部决策转换成终端信号行，并过滤仅纸面样本或弱执行质量样本</text>
<text x="414" y="1997" font-size="18" fill="#222">输出:最终信号、终端展示、CSV(表格)、复盘报告</text>
<line x1="1200.0" y1="2042" x2="1200.0" y2="2102" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="1154.0" y="2057.0" width="92" height="30" rx="8" fill="#fff" opacity="0.88"/>
<text x="1200.0" y="2077.0" text-anchor="middle" font-size="16" fill="#333">最终闭环</text>
<rect x="240" y="2102" width="1920" height="238" rx="18" ry="18" fill="#f0fff4" stroke="#2f855a" stroke-width="2"/>
<text x="1200.0" y="2136" text-anchor="middle" font-size="25" font-weight="700" fill="#111">交易生命周期闭环</text>
<text x="264" y="2170" font-size="19" fill="#222">交易计划:由信号决策生成退出风格、初始止损、仓位计划和约束计划</text>
<text x="264" y="2201" font-size="19" fill="#222">交易执行:买入、减仓、退出，支持快照级执行代理</text>
<text x="264" y="2232" font-size="19" fill="#222">交易结果:净收益、最大浮盈、最大回撤、退出原因</text>
<text x="264" y="2263" font-size="19" fill="#222">默认口径:当日只买不卖，次日不及预期/低开下杀先减仓，余仓动态止损</text>
<text x="264" y="2294" font-size="19" fill="#222">研究口径:盘中代理只用于识别失败结构，不作为默认实盘收益解释</text>
<path d="M 2160 2221.0 L 2280 2221.0 L 2280 949.5 L 2010 949.5" fill="none" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="1977.5" y="1570.25" width="605" height="30" rx="8" fill="#fff" opacity="0.88"/>
<text x="2280.0" y="1590.25" text-anchor="middle" font-size="16" fill="#333">feedback(复盘反馈):弱链 / guardrail(护栏) / paper trial(纸面试验)</text>
<path d="M 240 2221.0 L 120 2221.0 L 120 949.5 L 390 949.5" fill="none" stroke="#333" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="-151.0" y="1570.25" width="542" height="30" rx="8" fill="#fff" opacity="0.88"/>
<text x="120.0" y="1590.25" text-anchor="middle" font-size="16" fill="#333">cross-window review(跨窗口复核):2025H1 / 2025H2 / 2026验证</text>
<text x="1200.0" y="2420" text-anchor="middle" font-size="16" fill="#666">面试讲法:四大拼图先解释“为什么能买”，mode(模式)解释“买点类型”，arbitration(仲裁)解释“最终分和仓位”，Phase3(交易闭环)解释“怎么买、怎么卖、怎么复盘”。</text>
</svg>